app = "ig-telegram-integration"
primary_region = "gru"   # São Paulo (closest established Fly region to Argentina)

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/data.db"

# Single always-on machine: Telegram long-polling allows only one getUpdates
# consumer per bot token, and SQLite lives on one volume. Do not scale > 1.
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # gate deploys on the app actually answering: GET / returns "ok" once the server is up
  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/"
    timeout = "2s"

[mounts]
  source = "ig_data"
  destination = "/data"
